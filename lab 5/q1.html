<!DOCTYPE html>
<html>
<head>
    <title>Cookie Example</title>
</head>
<body>

<h2>Cookie Demo</h2>

<script>

// Function to create and store a cookie
function setCookie(cname, cvalue, exdays) {

    // Create a Date object
    let d = new Date();

    // Set cookie expiry time
    d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));

    // Convert expiry date to UTC format
    let expires = "expires=" + d.toUTCString();

    // Store the cookie
    document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
}

// Function to retrieve a cookie
function getCookie(cname) {

    let name = cname + "=";

    // Split all cookies into an array
    let ca = document.cookie.split(';');

    // Search for the required cookie
    for (let i = 0; i < ca.length; i++) {

        let c = ca[i].trim();

        if (c.indexOf(name) == 0) {
            return c.substring(name.length);
        }
    }

    // Return empty string if cookie not found
    return "";
}

// Get the stored username
let user = getCookie("username");

// If cookie doesn't exist
if (user == "") {

    // Ask the user for their name
    user = prompt("Enter your name:");

    // Store the name in cookie for 7 days
    if (user != "" && user != null) {
        setCookie("username", user, 7);

        document.write("<h3>Welcome " + user + "</h3>");
    }

}
else {

    // Display greeting using stored cookie
    document.write("<h3>Welcome back, " + user + "!</h3>");
}

</script>

</body>
</html>
